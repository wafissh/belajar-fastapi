<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>FastAPI Blog - 404 Not Found</title>
    <meta name="description" content="Page not found">

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Custom Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Stylesheet -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/main.css') }}">

    <meta name="theme-color" content="#527c9f">

    <link rel="icon" href="{{ url_for('static', path='icons/favicon.ico') }}" sizes="any">
    <link rel="icon" href="{{ url_for('static', path='icons/icon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='icons/icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', path='site.webmanifest') }}">

    <style>
      body {
        font-family: "Nunito", sans-serif;
      }
      .error-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-code {
        font-family: "Montserrat", sans-serif;
        font-size: 10rem;
        font-weight: 900;
        line-height: 1;
        color: var(--bs-heading-color, #2c3e50);
        text-shadow: 4px 4px 0 rgba(82, 124, 159, 0.3);
      }
      .error-message {
        font-size: 1.5rem;
        color: var(--bs-secondary-color, #6c757d);
        margin-bottom: 0.5rem;
      }
      .error-detail {
        color: var(--bs-secondary-color, #6c757d);
        margin-bottom: 2rem;
      }
      @media (max-width: 576px) {
        .error-code {
          font-size: 6rem;
        }
        .error-message {
          font-size: 1.25rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="text-center px-3">
        <h1 class="error-code">404</h1>
        <p class="error-message">Oops! Halaman tidak ditemukan</p>
        <p class="error-detail">{{ detail }}</p>
        <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg">
          Kembali ke Home
        </a>
      </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <!-- Dark Mode Toggle -->
    <script>
      const setTheme = (theme) => {
        if (theme === 'auto') {
          document.documentElement.setAttribute('data-bs-theme',
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme);
        }
        localStorage.setItem('theme', theme);
      };
      setTheme(localStorage.getItem('theme') || 'auto');
    </script>
  </body>
</html>
